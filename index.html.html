<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FFFFFF;
    --paper-dark:#F0F0F0;
    --card:#FFFFFF;
    --ink:#000000;
    --ink-light:#4D4D4D;
    --heading:#931111;
    --heading-dark:#6E0C0C;
    --gold:#000000;
    --gold-dark:#000000;
    --red-seal:#931111;
    --success:#3F6B4A;
    --line:#D9D9D9;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:780px; margin:0 auto; padding:36px 20px 80px;}
  header.masthead{text-align:center; border-bottom:3px double var(--heading); padding-bottom:18px; margin-bottom:28px;}
  .school-logo-img{max-height:84px; max-width:200px; margin:0 auto 14px; display:block;}
  .eyebrow{font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--heading); margin-bottom:8px;}
  h1.title{font-family:'Fraunces',serif; font-weight:700; font-size:clamp(28px,5vw,42px); margin:0 0 6px; letter-spacing:-0.5px; color:var(--heading);}
  .subtitle{font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--ink-light);}
  .card{background:var(--card); border:1px solid var(--line); border-radius:2px; box-shadow:0 1px 0 var(--line), 0 8px 22px -14px rgba(27,35,64,0.4); padding:28px; margin-bottom:22px; position:relative;}
  .card::before{content:""; position:absolute; left:0; top:14px; bottom:14px; width:2px; background:repeating-linear-gradient(to bottom, var(--line) 0 5px, transparent 5px 10px);}
  .card-inner{padding-left:16px;}
  label.field-label{display:block; font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--ink-light); margin-bottom:8px;}
  input[type=text], input[type=password], select, textarea{
    width:100%; padding:12px 14px; font-family:'Inter',sans-serif; font-size:15px;
    border:1.5px solid var(--line); border-radius:3px; background:#fff; color:var(--ink); outline:none;
  }
  textarea{font-family:'IBM Plex Mono',monospace; font-size:13px; min-height:90px; resize:vertical;}
  input[type=text]:focus, input[type=password]:focus, select:focus, textarea:focus{border-color:var(--gold);}
  input[type=file]{font-size:12px; font-family:'IBM Plex Mono',monospace;}
  .btn{font-family:'IBM Plex Mono',monospace; font-size:13px; letter-spacing:1px; text-transform:uppercase; padding:13px 26px; border-radius:3px; border:1.5px solid var(--ink); background:var(--ink); color:var(--paper); cursor:pointer; transition:transform .12s ease, box-shadow .12s ease;}
  .btn:hover{transform:translateY(-1px); box-shadow:0 4px 0 -1px var(--gold);}
  .btn:active{transform:translateY(1px); box-shadow:none;}
  .btn.secondary{background:transparent; color:var(--ink);}
  .btn.gold{background:var(--gold); border-color:var(--gold-dark); color:#fff;}
  .btn:disabled{opacity:.4; cursor:not-allowed; transform:none; box-shadow:none;}
  .position-block{margin-bottom:26px;}
  .position-title{font-family:'Fraunces',serif; font-weight:600; font-size:19px; margin:0 0 4px; display:flex; align-items:baseline; gap:8px; color:var(--heading);}
  .position-title .count{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-light); font-weight:400;}
  .candidate-row{display:flex; align-items:center; gap:14px; padding:14px 8px; border-bottom:1px dashed var(--line); cursor:pointer;}
  .candidate-row:last-child{border-bottom:none;}
  .bubble{width:22px; height:22px; border-radius:50%; border:2px solid var(--ink); flex-shrink:0; position:relative; transition:background .15s ease;}
  .candidate-row.selected .bubble{background:var(--ink);}
  .candidate-row.selected .bubble::after{content:""; position:absolute; inset:5px; border-radius:50%; background:var(--heading);}
  .cand-media{position:relative; width:44px; height:44px; flex-shrink:0;}
  .logo-badge{width:44px; height:44px; border-radius:6px; background:#fff; border:1.5px solid var(--line); object-fit:cover; padding:2px; display:block;}
  .logo-badge-fallback{width:44px; height:44px; border-radius:6px; border:1.5px dashed var(--line); display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--ink-light); background:var(--paper-dark);}
  .cand-name{font-weight:600; font-size:15px;}
  .cand-slogan{font-size:13px; color:var(--ink-light); font-style:italic; margin-top:2px;}
  .stamp{display:inline-block; border:3px solid var(--red-seal); color:var(--red-seal); font-family:'IBM Plex Mono',monospace; font-weight:600; letter-spacing:2px; text-transform:uppercase; padding:10px 18px; border-radius:6px; transform:rotate(-6deg); opacity:0; animation:stampIn .4s ease forwards .1s;}
  @keyframes stampIn{0%{opacity:0; transform:rotate(-6deg) scale(2.2);} 60%{opacity:1;} 100%{opacity:1; transform:rotate(-6deg) scale(1);}}
  .receipt{font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-light); margin-top:14px; line-height:1.7;}
  .bar-row{margin-bottom:14px;}
  .bar-label{display:flex; justify-content:space-between; align-items:center; font-size:14px; margin-bottom:5px; gap:8px;}
  .bar-name-wrap{display:flex; align-items:center; gap:8px;}
  .mini-logo-img{width:24px; height:24px; border-radius:4px; object-fit:cover; border:1px solid var(--line);}
  .mini-logo-fallback{width:24px; height:24px; border-radius:4px; background:var(--ink); color:var(--paper); display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700;}
  .bar-name{font-weight:600;}
  .bar-count{font-family:'IBM Plex Mono',monospace; color:var(--ink-light); flex-shrink:0;}
  .bar-track{height:10px; background:var(--paper-dark); border-radius:5px; overflow:hidden;}
  .bar-fill{height:100%; background:linear-gradient(90deg, #333333, var(--ink)); border-radius:5px; transition:width .5s ease;}
  .bar-fill.leader{background:linear-gradient(90deg, var(--heading-dark), var(--heading));}
  footer.foot{text-align:center; margin-top:30px; font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-light);}
  .tabs{display:flex; gap:8px; justify-content:center; margin-bottom:24px; flex-wrap:wrap;}
  .tab{font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:1px; text-transform:uppercase; padding:9px 16px; border:1.5px solid var(--ink); border-radius:20px; cursor:pointer; background:transparent; color:var(--ink);}
  .tab.active{background:var(--ink); color:var(--paper);}
  .empty-msg{color:var(--ink-light); font-size:14px; text-align:center; padding:20px;}
  .row-flex{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
  .row-flex input, .row-flex select{flex:1; min-width:120px;}
  .small-btn{font-family:'IBM Plex Mono',monospace; font-size:11px; padding:8px 12px; border:1.5px solid var(--line); background:#fff; border-radius:3px; cursor:pointer; white-space:nowrap;}
  .small-btn.danger{color:var(--red-seal); border-color:var(--red-seal);}
  .admin-list-item{display:flex; justify-content:space-between; align-items:center; gap:10px; padding:8px 0; border-bottom:1px dashed var(--line);}
  .admin-list-item .left{display:flex; align-items:center; gap:10px; min-width:0;}
  .admin-list-item .left span{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .msg-banner{font-size:13px; padding:10px 14px; border-radius:3px; margin-bottom:16px; font-family:'IBM Plex Mono',monospace;}
  .msg-banner.error{background:#F6E4E1; color:var(--red-seal); border:1px solid var(--red-seal);}
  .msg-banner.ok{background:#E7EFE7; color:var(--success); border:1px solid var(--success);}
  .loading-line{text-align:center; padding:40px; color:var(--ink-light); font-family:'IBM Plex Mono',monospace; font-size:13px;}
  .sub-card-title{font-family:'Fraunces',serif; font-weight:600; font-size:17px; margin:0 0 12px; color:var(--heading);}
  .field-hint{font-size:11px; color:var(--ink-light); margin-top:4px; font-family:'IBM Plex Mono',monospace;}
  .roster-list{max-height:280px; overflow-y:auto; margin-top:10px; border-top:1px dashed var(--line); padding-top:6px;}
  .roster-count-badge{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-light);}
  .grade-pill{display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:10px; padding:2px 7px; border-radius:10px; background:var(--paper-dark); color:var(--ink-light); flex-shrink:0;}
  .divider-label{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-light); margin:16px 0 8px; text-transform:uppercase; letter-spacing:1px;}
  .grade-tick-row{display:flex; flex-wrap:wrap; gap:8px 14px; margin-bottom:6px;}
  .grade-tick{display:flex; align-items:center; gap:6px; font-family:'IBM Plex Mono',monospace; font-size:12px; cursor:pointer; user-select:none;}
  .grade-tick input{accent-color:var(--heading); width:15px; height:15px; cursor:pointer;}
</style>

function parseDirectory(text) {
  const output = [];
  if(!text) return output;
  text.split("\n").forEach(line => {
    const parts = line.split(",");
    if (parts.length >= 3) {
      output.push({
        id: parts[0].trim(),
        name: parts[1].trim(),
        grade: parts[2].trim(),
        section: parts[3] ? parts[3].trim() : ""
      });
    }
  });
  return output;
}

const DEFAULT_ROSTER = parseDirectory(STAFF_RAW_DATA).concat(parseDirectory(STUDENT_RAW_DATA));

  view: "vote",
  config: null,
  votes: {},
  voters: {}, 
  roster: [],
  houseRoster: [],

  lastReceipt: null,

};

function getStaffOrderScore(section) {
  const s = (section || "").toLowerCase();
  if (s.includes("managing director")) return 1;
  if (s.includes("academic director")) return 2;
  if (s.includes("academic in charge") || s.includes("academic incharge")) return 3;
  if (s.includes("hod")) return 4;
  if (s.includes("admin")) return 5;
  if (s.includes("teacher")) return 6;
  if (s.includes("driver")) return 7;
  return 8; 
}

async function loadAll(){
  const rawConfig = await safeGet("election-config");
  const rawVotes = await safeGet("election-votes");
  const rawVoters = await safeGet("election-voters");
  const rawRoster = await safeGet("election-roster");
  const rawHouseRoster = await safeGet("election-house-roster");
  const rawHouseVoters = await safeGet("election-house-voters");

  state.config = rawConfig ? JSON.parse(rawConfig) : JSON.parse(JSON.stringify(DEFAULT_CONFIG));
  state.votes = rawVotes ? JSON.parse(rawVotes) : {};
  state.roster = rawRoster ? JSON.parse(rawRoster) : JSON.parse(JSON.stringify(DEFAULT_ROSTER));
  state.houseRoster = rawHouseRoster ? JSON.parse(rawHouseRoster) : JSON.parse(JSON.stringify(state.roster));

  if (rawVoters) {
    try {
      const parsed = JSON.parse(rawVoters);
      state.voters = Array.isArray(parsed) ? parsed.reduce((acc, id) => ({...acc, [id]: 1}), {}) : parsed;
    } catch(e) { state.voters = {}; }
  } else { state.voters = {}; }

  if (rawHouseVoters) {
    try { state.houseVoters = JSON.parse(rawHouseVoters); } catch(e) { state.houseVoters = {}; }
  } else { state.houseVoters = {}; }
}

function esc(s){ const d = document.createElement("div"); d.textContent = s == null ? "" : s; return d.innerHTML; }
function normId(id){ return (id || "").trim().toLowerCase(); }

function logoHtml(photo){
  if (photo){ return '<img class="logo-badge" src="' + photo + '" alt="">'; }
  return '<div class="logo-badge-fallback">LOGO</div>';
}

function render(){
  const app = document.getElementById("app");
  const cfg = state.config;
  let html = "";
  html += renderHeader(cfg);
  html += '<div class="tabs">' + tabBtn("vote","Vote") + tabBtn("house-vote","Special Votes") + tabBtn("admin","Admin") + '</div>';

  if (state.view === "vote") html += renderVote(cfg);
  else if (state.view === "house-vote") html += renderHouseVote(cfg);
  else if (state.view === "voted") html += renderVoted(cfg);
  else if (state.view === "admin-login") html += renderAdminLogin();
  else if (state.view === "admin") html += renderAdmin(cfg);

  html += renderFooter(cfg);
  app.innerHTML = html;
  attachHandlers();
}

function tabBtn(view, label){
  const active = state.view === view || (view==="vote" && state.view==="voted") || (view==="admin" && state.view==="admin-login");
  return '<button class="tab ' + (active ? "active":"") + '" data-tab="' + view + '">' + label + '</button>';
}

  });

  html += '<label class="field-label">Select Category / Grade</label>';
  html += '<select id="voteGradeSelect"><option value="">Choose option...</option>';
  gradesWithStudents.forEach(g => {
    html += '<option value="' + esc(g) + '" ' + (state.selectedGrade === g ? "selected" : "") + '>' + (g === "Faculty & Staff" ? esc(g) : 'Grade ' + esc(g)) + '</option>';
  });
  html += '</select>';

  html += '<div style="height:14px;"></div><label class="field-label">Select Your Name</label>';

  studentsInGrade.forEach(s => {

    let canonicalId = normId(s.id);
    let votesCast = state.voters[canonicalId] || 0;

      html += '<option value="' + esc(s.id) + '" disabled style="color:#bbb;">' + esc(s.name) + detailSuffix + ' (Already Voted)</option>';

      html += '<div class="bubble"></div>';
      html += '<div class="cand-media">' + logoHtml(c.logo) + '</div>';
      html += '<div><div class="cand-name">' + esc(c.name) + '</div></div></div>';
    });
    html += '</div></div>';
  });
  html += '<div style="text-align:center; margin-top:10px;"><button type="submit" class="btn gold">Cast My Vote</button></div>';
  html += '</form>';

function renderResults(cfg){
  let html = "";
  cfg.positions.forEach(pos => {
    const counts = pos.candidates.map(c => ({ ...c, count: state.votes[c.id] || 0 }));
    const total = counts.reduce((a,c) => a + c.count, 0);
    const maxCount = Math.max(1, ...counts.map(c => c.count));
    html += '<div class="card"><div class="card-inner">';
    html += '<div class="position-title">' + esc(pos.title) + ' <span class="count">' + total + ' vote' + (total===1?"":"s") + '</span></div>';
    counts.sort((a,b)=>b.count-a.count).forEach((c,i) => {
      const pct = total > 0 ? Math.round((c.count/total)*100) : 0;
      html += '<div class="bar-row">';
      html += '<div class="bar-label"><div class="bar-name-wrap"><span class="bar-name">' + esc(c.name) + '</span></div><span class="bar-count">' + c.count + ' (' + pct + '%)</span></div>';
      html += '<div class="bar-track"><div class="bar-fill ' + (i===0 && c.count>0 ? "leader":"") + '" style="width:' + (c.count/maxCount*100) + '%"></div></div>';
      html += '</div>';
    });
    html += '</div></div>';
  });
  return html;
}

function attachHandlers(){
  document.querySelectorAll('[data-tab]').forEach(el => {
    el.addEventListener('click', () => {
      const tab = el.getAttribute('data-tab');
      state.error = "";
      if (tab === "admin") state.view = state.isAdmin ? "admin" : "admin-login";
      else state.view = tab;
      render();
    });
  });

  const voteGradeSelect = document.getElementById('voteGradeSelect');
  if (voteGradeSelect){
    voteGradeSelect.addEventListener('change', (e) => {
      state.selectedGrade = e.target.value;
      state.selectedStudentId = "";
      render();
    });
  }
  const voteNameSelect = document.getElementById('voteNameSelect');
  if (voteNameSelect){
    voteNameSelect.addEventListener('change', (e) => { state.selectedStudentId = e.target.value; });
  }

  const houseGradeSelect = document.getElementById('houseGradeSelect');
  if (houseGradeSelect){
    houseGradeSelect.addEventListener('change', (e) => {
      state.selectedHouseGrade = e.target.value;
      state.selectedHouseStudentId = "";
      render();
    });
  }
  const houseNameSelect = document.getElementById('houseNameSelect');
  if (houseNameSelect){
    houseNameSelect.addEventListener('change', (e) => { state.selectedHouseStudentId = e.target.value; });
  }

  document.querySelectorAll('.candidate-row[data-pos]').forEach(row => {
    row.addEventListener('click', () => {
      state.selections[row.getAttribute('data-pos')] = row.getAttribute('data-cand');
      render();
    });
  });

  document.querySelectorAll('.candidate-row[data-house-pos]').forEach(row => {
    row.addEventListener('click', () => {
      state.houseSelections[row.getAttribute('data-house-pos')] = row.getAttribute('data-house-cand');
      render();
    });
  });

  const ballotForm = document.getElementById('ballotForm');
  if (ballotForm) ballotForm.addEventListener('submit', async (e) => { e.preventDefault(); await handleVoteSubmit(); });

  const houseBallotForm = document.getElementById('houseBallotForm');
  if (houseBallotForm) houseBallotForm.addEventListener('submit', async (e) => { e.preventDefault(); await handleHouseVoteSubmit(); });

  const adminLoginBtn = document.getElementById('adminLoginBtn');
  if (adminLoginBtn){
    adminLoginBtn.addEventListener('click', () => {
      if (document.getElementById('passcodeInput').value === state.config.passcode){ state.isAdmin = true; state.view = "admin"; }
      else state.adminError = "Invalid passcode.";
      render();
    });
  }

  const saveMetaBtn = document.getElementById('saveMetaBtn');
  if (saveMetaBtn){
    saveMetaBtn.addEventListener('click', async () => {
      state.config.schoolName = document.getElementById('schoolNameInput').value || state.config.schoolName;
      state.config.electionTitle = document.getElementById('electionTitleInput').value || state.config.electionTitle;
      const logoFileEl = document.getElementById('schoolLogoFile');
      const logoUrlEl = document.getElementById('schoolLogoUrl');
      const newLogo = (logoFileEl && logoFileEl.dataset.dataurl) || (logoUrlEl && logoUrlEl.value.trim()) || null;
      if (newLogo) state.config.schoolLogo = newLogo;
      await saveConfig();
      render();
    });
  }

  const schoolLogoFile = document.getElementById('schoolLogoFile');
  if (schoolLogoFile){
    schoolLogoFile.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      schoolLogoFile.dataset.dataurl = await resizeImageFile(file, 300);
    });
  }

  document.querySelectorAll('input[id^="newCandLogoFile-"]').forEach(inp => {
    inp.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      inp.dataset.dataurl = await resizeImageFile(file, 160);
    });
  });

  document.querySelectorAll('[data-add-cand]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const posId = btn.getAttribute('data-add-cand');
      const nameEl = document.getElementById('newCandName-' + posId);
      const name = nameEl.value.trim();
      if (!name) return;
      const sloganEl = document.getElementById('newCandSlogan-' + posId);
      const logoFile = document.getElementById('newCandLogoFile-' + posId);
      const logoUrl = document.getElementById('newCandLogoUrl-' + posId);
      const logo = (logoFile && logoFile.dataset.dataurl) || (logoUrl.value.trim() || null);
      const pos = state.config.positions.find(p => p.id === posId);
      pos.candidates.push({ id: genCandId(posId), name: name, slogan: sloganEl.value.trim(), logo: logo });
      await saveConfig();
      render();
    });
  });

  document.querySelectorAll('[data-remove-cand]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const [posId, candId] = btn.getAttribute('data-remove-cand').split('|');
      const pos = state.config.positions.find(p => p.id === posId);
      pos.candidates = pos.candidates.filter(c => c.id !== candId);
      await saveConfig();
      render();
    });
  });

  const importRosterBtn = document.getElementById('importRosterBtn');
  if (importRosterBtn){
    importRosterBtn.addEventListener('click', async () => {
      const added = importRosterText(document.getElementById('bulkRosterInput').value, false);
      await saveRoster();
      render();
      alert(added + ' general entries compiled.');
    });
  }

  const importHouseRosterBtn = document.getElementById('importHouseRosterBtn');
  if (importHouseRosterBtn){
    importHouseRosterBtn.addEventListener('click', async () => {
      const added = importRosterText(document.getElementById('bulkHouseRosterInput').value, true);
      await saveHouseRoster();
      render();
      alert(added + ' special entries compiled.');
    });
  }

  const clearHouseRosterBtn = document.getElementById('clearHouseRosterBtn');
  if (clearHouseRosterBtn){
    clearHouseRosterBtn.addEventListener('click', async () => {
      if (!confirm('Wipe special roster entries?')) return;
      state.houseRoster = [];
      await saveHouseRoster();
      render();
    });
  }

  const resetVotesBtn = document.getElementById('resetVotesBtn');
  if (resetVotesBtn){
    resetVotesBtn.addEventListener('click', async () => {
      if (!confirm('Reset entire vote counting metrics?')) return;
      state.votes = {}; state.voters = {}; state.houseVoters = {};
      await saveVotes(); await saveVoters(); await safeSet("election-house-voters", "{}");
      render();
    });
  }
}

function importRosterText(text, isHouse) {
  let count = 0; if(!text) return count;
  text.split(/\r?\n/).forEach(line => {
    const parts = line.split(',');
    if (parts.length >= 3) {
      const id = parts[0].trim(); const name = parts[1].trim(); let grade = parts[2].trim();
      if (grade.toLowerCase() !== "faculty & staff") grade = grade.replace(/[^0-9]/g, '').trim();
      const section = parts[3] ? parts[3].trim() : '';
      if (id && name && grade) {
        if(isHouse) {
          const idx = state.houseRoster.findIndex(s => normId(s.id) === normId(id));
          if (idx >= 0) state.houseRoster[idx] = { id, name, grade, section };
          else state.houseRoster.push({ id, name, grade, section });
        } else {
          const idx = state.roster.findIndex(s => normId(s.id) === normId(id));
          if (idx >= 0) state.roster[idx] = { id, name, grade, section };
          else state.roster.push({ id, name, grade, section });
        }
        count++;
      }
    }
  });
  return count;
}

async function handleVoteSubmit(){
  if (!state.selectedGrade || !state.selectedStudentId){ state.error = "Voter profiling coordinates missing."; render(); return; }
  const student = state.roster.find(s => s.id === state.selectedStudentId);
  const canonicalId = normId(student.id);
  let votesCast = state.voters[canonicalId] || 0;
  let maxAllowed = student.grade === "Faculty & Staff" ? 2 : 1;

  if (votesCast >= maxAllowed){ state.error = "Max ballot limit hit for this user context."; render(); return; }
  
  const targetKeys = state.config.positions.filter(p => !p.id.includes("captain") && !p.id.includes("vicecaptain") && !p.id.includes("group"));
  const missing = targetKeys.filter(p => p.candidates.length > 0 && !state.selections[p.id]);
  if (missing.length > 0){ state.error = "Ballot uncompleted. Choices missing."; render(); return; }

  Object.values(state.selections).forEach(candId => { state.votes[candId] = (state.votes[candId] || 0) + 1; });
  state.voters[canonicalId] = votesCast + 1;

  await saveVotes(); await saveVoters();

  state.lastReceipt = { name: student.name, grade: student.grade, time: new Date().toLocaleString(), code: genReceiptCode(), votesRemaining: maxAllowed - (votesCast + 1) };
  state.lastVoteView = "vote";
  state.selections = {}; state.selectedGrade = ""; state.selectedStudentId = ""; state.view = "voted";
  render();
}

async function handleHouseVoteSubmit(){
  if (!state.selectedHouseGrade || !state.selectedHouseStudentId){ state.error = "Special registration credentials missing."; render(); return; }
  const member = state.houseRoster.find(s => s.id === state.selectedHouseStudentId);
  const canonicalId = normId(member.id);
  let votesCast = state.houseVoters[canonicalId] || 0;
  let maxAllowed = member.grade === "Faculty & Staff" ? 2 : 1;

  if (votesCast >= maxAllowed){ state.error = "Max ballot limit hit for this user context."; render(); return; }

  const targetKeys = state.config.positions.filter(p => p.id.includes("captain") || p.id.includes("vicecaptain") || p.id.includes("group"));
  const missing = targetKeys.filter(p => p.candidates.length > 0 && !state.houseSelections[p.id]);
  if (missing.length > 0){ state.error = "Incomplete selections in Special Ballot positions."; render(); return; }

  Object.values(state.houseSelections).forEach(candId => { state.votes[candId] = (state.votes[candId] || 0) + 1; });
  state.houseVoters[canonicalId] = votesCast + 1;

  await saveVotes(); await saveHouseVoters();

  state.lastReceipt = { name: member.name, grade: member.grade, time: new Date().toLocaleString(), code: genReceiptCode(), votesRemaining: maxAllowed - (votesCast + 1) };
  state.lastVoteView = "house-vote";
  state.houseSelections = {}; state.selectedHouseGrade = ""; state.selectedHouseStudentId = ""; state.view = "voted";
  render();
}

(async function init(){
  await loadAll();
  render();
})();
</script>
