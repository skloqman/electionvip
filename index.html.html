<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Council Elections</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FFFFFF;
    --paper-dark:#F0F0F0;
    --card:#FFFFFF;
    --ink:#000000;
    --ink-light:#4D4D4D;
    --heading:#931111;
    --heading-dark:#6E0C0C;
    --gold:#000000;
    --gold-dark:#000000;
    --red-seal:#931111;
    --success:#3F6B4A;
    --line:#D9D9D9;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:780px; margin:0 auto; padding:36px 20px 80px;}
  header.masthead{text-align:center; border-bottom:3px double var(--heading); padding-bottom:18px; margin-bottom:28px;}
  .school-logo-img{max-height:84px; max-width:200px; margin:0 auto 14px; display:block;}
  .eyebrow{font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--heading); margin-bottom:8px;}
  h1.title{font-family:'Fraunces',serif; font-weight:700; font-size:clamp(28px,5vw,42px); margin:0 0 6px; letter-spacing:-0.5px; color:var(--heading);}
  .subtitle{font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--ink-light);}
  .card{background:var(--card); border:1px solid var(--line); border-radius:2px; box-shadow:0 1px 0 var(--line), 0 8px 22px -14px rgba(27,35,64,0.4); padding:28px; margin-bottom:22px; position:relative;}
  .card::before{content:""; position:absolute; left:0; top:14px; bottom:14px; width:2px; background:repeating-linear-gradient(to bottom, var(--line) 0 5px, transparent 5px 10px);}
  .card-inner{padding-left:16px;}
  label.field-label{display:block; font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--ink-light); margin-bottom:8px;}
  input[type=text], input[type=password], select, textarea{
    width:100%; padding:12px 14px; font-family:'Inter',sans-serif; font-size:15px;
    border:1.5px solid var(--line); border-radius:3px; background:#fff; color:var(--ink); outline:none;
  }
  textarea{font-family:'IBM Plex Mono',monospace; font-size:13px; min-height:90px; resize:vertical;}
  input[type=text]:focus, input[type=password]:focus, select:focus, textarea:focus{border-color:var(--gold);}
  input[type=file]{font-size:12px; font-family:'IBM Plex Mono',monospace;}
  .btn{font-family:'IBM Plex Mono',monospace; font-size:13px; letter-spacing:1px; text-transform:uppercase; padding:13px 26px; border-radius:3px; border:1.5px solid var(--ink); background:var(--ink); color:var(--paper); cursor:pointer; transition:transform .12s ease, box-shadow .12s ease;}
  .btn:hover{transform:translateY(-1px); box-shadow:0 4px 0 -1px var(--gold);}
  .btn:active{transform:translateY(1px); box-shadow:none;}
  .btn.secondary{background:transparent; color:var(--ink);}
  .btn.gold{background:var(--gold); border-color:var(--gold-dark); color:#fff;}
  .btn:disabled{opacity:.4; cursor:not-allowed; transform:none; box-shadow:none;}
  .position-block{margin-bottom:26px;}
  .position-title{font-family:'Fraunces',serif; font-weight:600; font-size:19px; margin:0 0 4px; display:flex; align-items:baseline; gap:8px; color:var(--heading);}
  .position-title .count{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-light); font-weight:400;}
  .candidate-row{display:flex; align-items:center; gap:14px; padding:14px 8px; border-bottom:1px dashed var(--line); cursor:pointer;}
  .candidate-row:last-child{border-bottom:none;}
  .bubble{width:22px; height:22px; border-radius:50%; border:2px solid var(--ink); flex-shrink:0; position:relative; transition:background .15s ease;}
  .candidate-row.selected .bubble{background:var(--ink);}
  .candidate-row.selected .bubble::after{content:""; position:absolute; inset:5px; border-radius:50%; background:var(--heading);}
  .cand-media{position:relative; width:56px; height:56px; flex-shrink:0;}
  .avatar-img{width:56px; height:56px; border-radius:50%; object-fit:cover; border:2px solid var(--line); display:block;}
  .avatar-fallback{width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:var(--ink); color:var(--gold); font-family:'Fraunces',serif; font-weight:700; font-size:20px; border:2px solid var(--line);}
  .logo-badge{position:absolute; right:-4px; bottom:-4px; width:24px; height:24px; border-radius:6px; background:#fff; border:1.5px solid var(--line); object-fit:cover; padding:1px;}
  .cand-name{font-weight:600; font-size:15px;}
  .cand-slogan{font-size:13px; color:var(--ink-light); font-style:italic; margin-top:2px;}
  .stamp{display:inline-block; border:3px solid var(--red-seal); color:var(--red-seal); font-family:'IBM Plex Mono',monospace; font-weight:600; letter-spacing:2px; text-transform:uppercase; padding:10px 18px; border-radius:6px; transform:rotate(-6deg); opacity:0; animation:stampIn .4s ease forwards .1s;}
  @keyframes stampIn{0%{opacity:0; transform:rotate(-6deg) scale(2.2);} 60%{opacity:1;} 100%{opacity:1; transform:rotate(-6deg) scale(1);}}
  .receipt{font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-light); margin-top:14px; line-height:1.7;}
  .bar-row{margin-bottom:14px;}
  .bar-label{display:flex; justify-content:space-between; align-items:center; font-size:14px; margin-bottom:5px; gap:8px;}
  .bar-name-wrap{display:flex; align-items:center; gap:8px;}
  .mini-avatar-img{width:22px; height:22px; border-radius:50%; object-fit:cover; border:1px solid var(--line);}
  .mini-avatar-fallback{width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:var(--ink); color:var(--gold); font-size:10px; font-weight:700; font-family:'Fraunces',serif;}
  .bar-name{font-weight:600;}
  .bar-count{font-family:'IBM Plex Mono',monospace; color:var(--ink-light); flex-shrink:0;}
  .bar-track{height:10px; background:var(--paper-dark); border-radius:5px; overflow:hidden;}
  .bar-fill{height:100%; background:linear-gradient(90deg, #333333, var(--ink)); border-radius:5px; transition:width .5s ease;}
  .bar-fill.leader{background:linear-gradient(90deg, var(--heading-dark), var(--heading));}
  footer.foot{text-align:center; margin-top:30px; font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-light);}
  .tabs{display:flex; gap:8px; justify-content:center; margin-bottom:24px; flex-wrap:wrap;}
  .tab{font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:1px; text-transform:uppercase; padding:9px 16px; border:1.5px solid var(--ink); border-radius:20px; cursor:pointer; background:transparent; color:var(--ink);}
  .tab.active{background:var(--ink); color:var(--paper);}
  .empty-msg{color:var(--ink-light); font-size:14px; text-align:center; padding:20px;}
  .row-flex{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
  .row-flex input, .row-flex select{flex:1; min-width:120px;}
  .small-btn{font-family:'IBM Plex Mono',monospace; font-size:11px; padding:8px 12px; border:1.5px solid var(--line); background:#fff; border-radius:3px; cursor:pointer; white-space:nowrap;}
  .small-btn.danger{color:var(--red-seal); border-color:var(--red-seal);}
  .admin-list-item{display:flex; justify-content:space-between; align-items:center; gap:10px; padding:8px 0; border-bottom:1px dashed var(--line);}
  .admin-list-item .left{display:flex; align-items:center; gap:10px; min-width:0;}
  .admin-list-item .left span{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .msg-banner{font-size:13px; padding:10px 14px; border-radius:3px; margin-bottom:16px; font-family:'IBM Plex Mono',monospace;}
  .msg-banner.error{background:#F6E4E1; color:var(--red-seal); border:1px solid var(--red-seal);}
  .msg-banner.ok{background:#E7EFE7; color:var(--success); border:1px solid var(--success);}
  .loading-line{text-align:center; padding:40px; color:var(--ink-light); font-family:'IBM Plex Mono',monospace; font-size:13px;}
  .sub-card-title{font-family:'Fraunces',serif; font-weight:600; font-size:17px; margin:0 0 12px; color:var(--heading);}
  .field-hint{font-size:11px; color:var(--ink-light); margin-top:4px; font-family:'IBM Plex Mono',monospace;}
  .roster-list{max-height:280px; overflow-y:auto; margin-top:10px; border-top:1px dashed var(--line); padding-top:6px;}
  .roster-count-badge{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-light);}
  .grade-pill{display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:10px; padding:2px 7px; border-radius:10px; background:var(--paper-dark); color:var(--ink-light); flex-shrink:0;}
  .divider-label{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-light); margin:16px 0 8px; text-transform:uppercase; letter-spacing:1px;}
  .grade-tick-row{display:flex; flex-wrap:wrap; gap:8px 14px; margin-bottom:6px;}
  .grade-tick{display:flex; align-items:center; gap:6px; font-family:'IBM Plex Mono',monospace; font-size:12px; cursor:pointer; user-select:none;}
  .grade-tick input{accent-color:var(--heading); width:15px; height:15px; cursor:pointer;}
</style>
</head>

async function safeGet(key){
  try{ const r = await window.storage.get(key, SHARED); return r ? r.value : null; }
  catch(e){ return null; }
}
async function safeSet(key, value){
  try{ await window.storage.set(key, value, SHARED); return true; }
  catch(e){ console.error("storage set failed", e); return false; }
}

async function loadAll(){
  const rawConfig = await safeGet("election-config");
  const rawVotes = await safeGet("election-votes");
  const rawVoters = await safeGet("election-voters");
  const rawRoster = await safeGet("election-roster");

  state.config = rawConfig ? JSON.parse(rawConfig) : JSON.parse(JSON.stringify(DEFAULT_CONFIG));
  state.votes = rawVotes ? JSON.parse(rawVotes) : {};
  state.roster = rawRoster ? JSON.parse(rawRoster) : JSON.parse(JSON.stringify(DEFAULT_ROSTER));

  if (rawVoters) {
    try {
      const parsedVoters = JSON.parse(rawVoters);
      if (Array.isArray(parsedVoters)) {
        state.voters = {};
        parsedVoters.forEach(id => { state.voters[id] = 1; });
      } else {
        state.voters = parsedVoters;
      }
    } catch(e) {
      state.voters = {};
    }
  } else {
    state.voters = {};
  }

  if (!rawConfig) await safeSet("election-config", JSON.stringify(state.config));
  if (!rawRoster) await safeSet("election-roster", JSON.stringify(state.roster));
}

async function saveConfig(){ await safeSet("election-config", JSON.stringify(state.config)); }
async function saveVotes(){ await safeSet("election-votes", JSON.stringify(state.votes)); }
async function saveVoters(){ await safeSet("election-voters", JSON.stringify(state.voters)); }
async function saveRoster(){ await safeSet("election-roster", JSON.stringify(state.roster)); }

function esc(s){ const d = document.createElement("div"); d.textContent = s == null ? "" : s; return d.innerHTML; }
function normId(id){ return (id || "").trim().toLowerCase(); }
function initials(name){
  return (name||"").trim().split(/\s+/).slice(0,2).map(w=>w[0]||"").join("").toUpperCase();
}

function resizeImageFile(file, maxDim){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w >= h && w > maxDim){ h = Math.round(h * maxDim / w); w = maxDim; }
        else if (h > w && h > maxDim){ w = Math.round(w * maxDim / h); h = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.82));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function avatarHtml(name, photo, sizeClass){
  if (photo){
    return '<img class="' + (sizeClass==='mini' ? 'mini-avatar-img' : 'avatar-img') + '" src="' + photo + '" alt="">';
  }
  return '<div class="' + (sizeClass==='mini' ? 'mini-avatar-fallback' : 'avatar-fallback') + '">' + esc(initials(name)) + '</div>';
}

function render(){
  const app = document.getElementById("app");
  const cfg = state.config;
  let html = "";
  html += renderHeader(cfg);
  html += '<div class="tabs">' + tabBtn("vote","Vote") + tabBtn("admin","Admin") + '</div>';

  if (state.view === "vote") html += renderVote(cfg);
  else if (state.view === "voted") html += renderVoted(cfg);
  else if (state.view === "admin-login") html += renderAdminLogin();
  else if (state.view === "admin") html += renderAdmin(cfg);

  html += renderFooter(cfg);
  app.innerHTML = html;
  attachHandlers();
}

function tabBtn(view, label){
  const active = state.view === view || (view==="vote" && state.view==="voted") || (view==="admin" && state.view==="admin-login");
  return '<button class="tab ' + (active ? "active":"") + '" data-tab="' + view + '">' + label + '</button>';
}

function renderHeader(cfg){
  const logo = cfg.schoolLogo ? '<img class="school-logo-img" src="' + cfg.schoolLogo + '" alt="School logo">' : '';
  return '<header class="masthead">' + logo + '<div class="eyebrow">Official Ballot &middot; ' + esc(cfg.year) + '</div>' +
    '<h1 class="title">' + esc(cfg.schoolName) + '</h1>' +
    '<div class="subtitle">' + esc(cfg.electionTitle) + '</div></header>';
}

function renderFooter(cfg){
  const totalVotesCast = Object.values(state.voters).reduce((a, b) => a + b, 0);
  return '<footer class="foot">' + totalVotesCast + ' ballot' + (totalVotesCast===1?"":"s") + ' cast &middot; ' + state.roster.length + ' registered voters</footer>';
}

function renderVote(cfg){
  let html = '<div class="card"><div class="card-inner">';
  if (state.error) html += '<div class="msg-banner error">' + esc(state.error) + '</div>';

  // FIX: Fixed sorting logic to handle string values like "Faculty & Staff" safely
  const gradesWithStudents = Array.from(new Set(state.roster.map(s => String(s.grade)))).sort((a, b) => {
    if (a === "Faculty & Staff") return -1;
    if (b === "Faculty & Staff") return 1;
    return parseInt(a, 10) - parseInt(b, 10);
  });

  html += '<label class="field-label">Select Category / Grade</label>';
  html += '<select id="voteGradeSelect"><option value="">Choose option...</option>';
  gradesWithStudents.forEach(g => {
    html += '<option value="' + esc(g) + '" ' + (state.selectedGrade === g ? "selected" : "") + '>' + (g === "Faculty & Staff" ? esc(g) : 'Grade ' + esc(g)) + '</option>';
  });
  html += '</select>';
  if (gradesWithStudents.length === 0){
    html += '<div class="receipt">No registration data verified yet.</div>';
  }

  html += '<div style="height:14px;"></div><label class="field-label">Select Your Name</label>';
  const studentsInGrade = state.selectedGrade ? state.roster.filter(s => String(s.grade) === state.selectedGrade).sort((a,b)=>a.name.localeCompare(b.name)) : [];
  html += '<select id="voteNameSelect" ' + (state.selectedGrade ? "" : "disabled") + '>';
  html += '<option value="">' + (state.selectedGrade ? "Choose your name" : "Select grade options first") + '</option>';
  studentsInGrade.forEach(s => {
    let detailSuffix = s.section ? ' (' + esc(s.section) + ')' : '';
    let canonicalId = normId(s.id);
    let votesCast = state.voters[canonicalId] || 0;
    let maxAllowed = s.grade === "Faculty & Staff" ? 2 : 1;
    
    if (votesCast >= maxAllowed) {
      html += '<option value="' + esc(s.id) + '" disabled style="color:#bbb;">' + esc(s.name) + detailSuffix + ' (Already Voted)</option>';
    } else if (votesCast > 0) {
      html += '<option value="' + esc(s.id) + '" ' + (state.selectedStudentId === s.id ? "selected" : "") + '>' + esc(s.name) + detailSuffix + ' (Ballot ' + (votesCast + 1) + ' of ' + maxAllowed + ')</option>';
    } else {
      html += '<option value="' + esc(s.id) + '" ' + (state.selectedStudentId === s.id ? "selected" : "") + '>' + esc(s.name) + detailSuffix + '</option>';
    }
  });
  html += '</select>';

  html += '<div class="receipt">Roster authentication rule: Students get 1 vote. Faculty & Staff get 2 votes.</div>';
  html += '</div></div>';

  html += '<form id="ballotForm">';
  cfg.positions.forEach(pos => {
    html += '<div class="card"><div class="card-inner position-block">';
    html += '<div class="position-title">' + esc(pos.title) + ' <span class="count">choose one</span></div>';
    if (pos.candidates.length === 0) html += '<div class="empty-msg">No candidates verified for this role yet.</div>';
    pos.candidates.forEach(c => {
      const selected = state.selections[pos.id] === c.id;
      html += '<div class="candidate-row ' + (selected ? "selected":"") + '" data-pos="' + pos.id + '" data-cand="' + c.id + '">';
      html += '<div class="bubble"></div>';
      html += '<div class="cand-media">' + avatarHtml(c.name, c.photo, 'full') + (c.logo ? '<img class="logo-badge" src="' + c.logo + '" alt="">' : '') + '</div>';
      html += '<div><div class="cand-name">' + esc(c.name) + '</div>';
      if (c.slogan) html += '<div class="cand-slogan">"' + esc(c.slogan) + '"</div>';
      html += '</div></div>';
    });
    html += '</div></div>';
  });
  html += '<div style="text-align:center; margin-top:10px;"><button type="submit" class="btn gold">Cast My Vote</button></div>';
  html += '</form>';
  return html;
}

function renderVoted(cfg){
  const r = state.lastReceipt;
  let gradeDisplay = r.grade === "Faculty & Staff" ? "Faculty & Staff" : "Grade " + r.grade;
  let nextStepsHtml = r.votesRemaining > 0 
    ? '<div class="receipt" style="margin-top:18px; font-weight:bold; color:var(--heading);">You have ' + r.votesRemaining + ' ballot remaining. You can select your name again to cast your second vote.</div>'
    : '<div class="receipt" style="margin-top:18px;">Results will be announced by your school once voting closes.</div>';

  return '<div class="card"><div class="card-inner" style="text-align:center;">' +
    '<div class="stamp">Ballot Received</div>' +
    '<div class="receipt">Voter: ' + esc(r.name) + (r.grade ? ' &middot; ' + esc(gradeDisplay) : '') + '<br>Time: ' + esc(r.time) + '<br>Confirmation: ' + esc(r.code) + '</div>' +
    nextStepsHtml +
    '<div style="margin-top: 20px;"><button class="btn" onclick="state.view=\'vote\'; render();">Return to Ballot</button></div>' +
    '</div></div>';
}

function renderResults(cfg){
  let html = "";
  cfg.positions.forEach(pos => {
    const counts = pos.candidates.map(c => ({ ...c, count: state.votes[c.id] || 0 }));
    const total = counts.reduce((a,c) => a + c.count, 0);
    const maxCount = Math.max(1, ...counts.map(c => c.count));
    html += '<div class="card"><div class="card-inner">';
    html += '<div class="position-title">' + esc(pos.title) + ' <span class="count">' + total + ' vote' + (total===1?"":"s") + '</span></div>';
    if (counts.length === 0) html += '<div class="empty-msg">No candidates listed.</div>';
    counts.sort((a,b)=>b.count-a.count).forEach((c,i) => {
      const pct = total > 0 ? Math.round((c.count/total)*100) : 0;
      html += '<div class="bar-row">';
      html += '<div class="bar-label"><div class="bar-name-wrap">' + avatarHtml(c.name, c.photo, 'mini') + '<span class="bar-name">' + esc(c.name) + '</span></div><span class="bar-count">' + c.count + ' (' + pct + '%)</span></div>';
      html += '<div class="bar-track"><div class="bar-fill ' + (i===0 && c.count>0 ? "leader":"") + '" style="width:' + (c.count/maxCount*100) + '%"></div></div>';
      html += '</div>';
    });
    html += '</div></div>';
  });
  return html;
}

  html += '<div class="receipt" style="margin-top:0; margin-bottom:10px;">Deletes casted vote counts and voter tracking history. Roster profiles and metadata states are preserved.</div>';
  html += '<button class="btn small-btn danger" id="resetVotesBtn" style="padding:10px 16px;">Reset Vote Database Only</button></div></div>';

  return html;
}

function getCheckedGrades(){
  const boxes = Array.from(document.querySelectorAll('.rosterGradeTick'));
  const gradeBoxes = boxes.filter(b => b.value !== 'all');
  return gradeBoxes.filter(b => b.checked).map(b => b.value);
}

function renderRosterListDOM(){
  const container = document.getElementById('rosterListItems');
  if (!container) return;
  const search = normId(document.getElementById('rosterSearchInput')?.value || "");
  const checkedGrades = getCheckedGrades();

  let list = state.roster.slice().sort((a,b) => {
    if (a.grade === "Faculty & Staff" && b.grade !== "Faculty & Staff") return -1;
    if (a.grade !== "Faculty & Staff" && b.grade === "Faculty & Staff") return 1;
    if (a.grade === "Faculty & Staff" && b.grade === "Faculty & Staff") return a.name.localeCompare(b.name);
    return (parseInt(a.grade, 10) - parseInt(b.grade, 10)) || a.name.localeCompare(b.name);
  });

  if (checkedGrades.length === 0){
    container.innerHTML = '<div class="empty-msg">Select a configuration class filter to view entries.</div>';
    return;
  }
  list = list.filter(s => checkedGrades.includes(String(s.grade)));
  if (search) list = list.filter(s => normId(s.id).includes(search) || normId(s.name).includes(search));

  if (list.length === 0){
    container.innerHTML = '<div class="empty-msg">No profiles match active filters.</div>';
    return;
  }
  const shown = list.slice(0, 150);
  let html = shown.map(s => {
    let tag = s.grade === "Faculty & Staff" ? "Staff" : "G" + s.grade;
    let desc = s.section ? ' &middot; ' + esc(s.section) : '';
    return '<div class="admin-list-item"><div class="left">' +
      '<span class="grade-pill">' + tag + '</span>' +
      '<span>' + esc(s.name) + desc + ' [' + esc(s.id) + ']</span></div>' +
      '<button class="small-btn danger" data-remove-student="' + esc(s.id) + '">Remove</button></div>';
  }).join('');
  if (list.length > 150) html += '<div class="field-hint" style="padding:8px 0;">Display capped at first 150 records. Narrow query metrics to filter specific records.</div>';
  container.innerHTML = html;

  container.querySelectorAll('[data-remove-student]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.getAttribute('data-remove-student');
      state.roster = state.roster.filter(s => s.id !== id);
      await saveRoster();
      document.getElementById('rosterTotalCount').textContent = state.roster.length + ' entries';
      renderRosterListDOM();
    });
  });
}

function genCandId(posId){ return posId + '-' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function genPosId(title){ return title.toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,20) + '-' + Date.now().toString(36).slice(-4); }
function genReceiptCode(){ return Math.random().toString(36).slice(2,6).toUpperCase() + '-' + Math.random().toString(36).slice(2,6).toUpperCase(); }

function attachHandlers(){
  document.querySelectorAll('[data-tab]').forEach(el => {
    el.addEventListener('click', async () => {
      const tab = el.getAttribute('data-tab');
      state.error = "";
      if (tab === "admin") state.view = state.isAdmin ? "admin" : "admin-login";
      else if (tab === "vote"){
        state.view = "vote";
        const rawRoster = await safeGet("election-roster");
        state.roster = rawRoster ? JSON.parse(rawRoster) : state.roster;
      }
      else state.view = tab;
      render();
    });
  });

  const voteGradeSelect = document.getElementById('voteGradeSelect');
  if (voteGradeSelect){
    voteGradeSelect.addEventListener('change', (e) => {
      state.selectedGrade = e.target.value;
      state.selectedStudentId = "";
      state.error = "";
      render();
    });
  }
  const voteNameSelect = document.getElementById('voteNameSelect');
  if (voteNameSelect){
    voteNameSelect.addEventListener('change', (e) => {
      state.selectedStudentId = e.target.value;
      state.error = "";
    });
  }

  document.querySelectorAll('.candidate-row').forEach(row => {
    row.addEventListener('click', () => {
      state.selections[row.getAttribute('data-pos')] = row.getAttribute('data-cand');
      render();
    });
  });

  const ballotForm = document.getElementById('ballotForm');
  if (ballotForm) ballotForm.addEventListener('submit', async (e) => { e.preventDefault(); await handleVoteSubmit(); });

  const adminLoginBtn = document.getElementById('adminLoginBtn');
  if (adminLoginBtn){
    adminLoginBtn.addEventListener('click', () => {
      const val = document.getElementById('passcodeInput').value;
      if (val === state.config.passcode){ state.isAdmin = true; state.adminError = ""; state.view = "admin"; }
      else state.adminError = "Incorrect passcode credentials.";
      render();
    });
  }

  const saveMetaBtn = document.getElementById('saveMetaBtn');
  if (saveMetaBtn){
    saveMetaBtn.addEventListener('click', async () => {
      state.config.schoolName = document.getElementById('schoolNameInput').value || state.config.schoolName;
      state.config.electionTitle = document.getElementById('electionTitleInput').value || state.config.electionTitle;
      const logoFileEl = document.getElementById('schoolLogoFile');
      const logoUrlEl = document.getElementById('schoolLogoUrl');
      const newLogo = (logoFileEl && logoFileEl.dataset.dataurl) || (logoUrlEl && logoUrlEl.value.trim()) || null;
      if (newLogo) state.config.schoolLogo = newLogo;
      await saveConfig();
      render();
    });
  }

  const schoolLogoFile = document.getElementById('schoolLogoFile');
  if (schoolLogoFile){
    schoolLogoFile.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      schoolLogoFile.dataset.dataurl = await resizeImageFile(file, 300);
    });
  }

  document.querySelectorAll('input[id^="newCandPhotoFile-"], input[id^="newCandLogoFile-"]').forEach(inp => {
    inp.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const isLogo = inp.id.indexOf('Logo') !== -1;
      const dataUrl = await resizeImageFile(file, isLogo ? 160 : 240);
      inp.dataset.dataurl = dataUrl;
    });
  });

  document.querySelectorAll('[data-add-cand]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const posId = btn.getAttribute('data-add-cand');
      const nameEl = document.getElementById('newCandName-' + posId);
      const name = nameEl.value.trim();
      if (!name) return;
      const sloganEl = document.getElementById('newCandSlogan-' + posId);
      const photoFile = document.getElementById('newCandPhotoFile-' + posId);
      const photoUrl = document.getElementById('newCandPhotoUrl-' + posId);
      const logoFile = document.getElementById('newCandLogoFile-' + posId);
      const logoUrl = document.getElementById('newCandLogoUrl-' + posId);
      const photo = (photoFile && photoFile.dataset.dataurl) || (photoUrl.value.trim() || null);
      const logo = (logoFile && logoFile.dataset.dataurl) || (logoUrl.value.trim() || null);
      const pos = state.config.positions.find(p => p.id === posId);
      pos.candidates.push({ id: genCandId(posId), name: name, slogan: sloganEl.value.trim(), photo: photo, logo: logo });
      await saveConfig();
      render();
    });
  });

  document.querySelectorAll('[data-remove-cand]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const [posId, candId] = btn.getAttribute('data-remove-cand').split('|');
      const pos = state.config.positions.find(p => p.id === posId);
      pos.candidates = pos.candidates.filter(c => c.id !== candId);
      await saveConfig();
      render();
    });
  });

  const addPosBtn = document.getElementById('addPosBtn');
  if (addPosBtn){
    addPosBtn.addEventListener('click', async () => {
      const titleEl = document.getElementById('newPosTitle');
      const title = titleEl.value.trim();
      if (!title) return;
      state.config.positions.push({ id: genPosId(title), title: title, candidates: [] });
      await saveConfig();
      render();
    });
  }

  document.querySelectorAll('[data-remove-pos]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const posId = btn.getAttribute('data-remove-pos');
      if (!confirm('Remove this custom ballot configuration column?')) return;
      state.config.positions = state.config.positions.filter(p => p.id !== posId);
      await saveConfig();
      render();
    });
  });

  const changePassBtn = document.getElementById('changePassBtn');
  if (changePassBtn){
    changePassBtn.addEventListener('click', async () => {
      const val = document.getElementById('newPasscodeInput').value.trim();
      if (!val) return;
      state.config.passcode = val;
      await saveConfig();
      alert('Security passcode keys altered successfully.');
      render();
    });
  }

  const resetVotesBtn = document.getElementById('resetVotesBtn');
  if (resetVotesBtn){
    resetVotesBtn.addEventListener('click', async () => {
      if (!confirm('This clean trace resets cast ballot counts and active records without wiping roster data. Continue?')) return;
      state.votes = {}; state.voters = {};
      await saveVotes(); await saveVoters();
      render();
    });
  }

  const addStudentBtn = document.getElementById('addStudentBtn');
  if (addStudentBtn){
    addStudentBtn.addEventListener('click', async () => {
      const id = document.getElementById('newStudentId').value.trim();
      const name = document.getElementById('newStudentName').value.trim();
      const grade = document.getElementById('newStudentGrade').value;
      const section = document.getElementById('newStudentSection').value.trim();
      if (!id || !name || !grade){ alert('Identification matrices and Category mappings are mandatory fields.'); return; }
      upsertStudent({ id, name, grade, section });
      await saveRoster();
      document.getElementById('newStudentId').value = '';
      document.getElementById('newStudentName').value = '';
      document.getElementById('newStudentGrade').value = '';
      document.getElementById('newStudentSection').value = '';
      document.getElementById('rosterTotalCount').textContent = state.roster.length + ' entries';
      renderRosterListDOM();
    });
  }

  const importRosterBtn = document.getElementById('importRosterBtn');
  if (importRosterBtn){
    importRosterBtn.addEventListener('click', async () => {
      const raw = document.getElementById('bulkRosterInput').value;
      const added = importRosterText(raw);
      await saveRoster();
      document.getElementById('bulkRosterInput').value = '';
      document.getElementById('rosterTotalCount').textContent = state.roster.length + ' entries';
      renderRosterListDOM();
      alert(added + ' directory entities compiled successfully.');
    });
  }

  const importCsvBtn = document.getElementById('importCsvBtn');
  if (importCsvBtn){
    importCsvBtn.addEventListener('click', () => {
      const fileInput = document.getElementById('rosterCsvFile');
      const status = document.getElementById('csvImportStatus');
      const file = fileInput.files[0];
      if (!file){ status.textContent = 'Target standard data matrices (.csv) required.'; return; }
      const reader = new FileReader();
      reader.onload = async (e) => {
        const added = importRosterText(e.target.result);
        await saveRoster();
        fileInput.value = '';
        document.getElementById('rosterTotalCount').textContent = state.roster.length + ' entries';
        renderRosterListDOM();
        status.textContent = added + ' elements loaded from directory: ' + file.name;
      };
      reader.onerror = () => { status.textContent = 'Parsing collision encountered. Re-verify document states.'; };
      reader.readAsText(file);
    });
  }

  const clearRosterBtn = document.getElementById('clearRosterBtn');
  if (clearRosterBtn){
    clearRosterBtn.addEventListener('click', async () => {
      if (!confirm('Warning: Wiping the registration directory completely empties current select paths. Reset?')) return;
      state.roster = [];
      await saveRoster();
      document.getElementById('rosterTotalCount').textContent = '0 entries';
      renderRosterListDOM();
    });
  }

  const rosterSearchInput = document.getElementById('rosterSearchInput');
  if (rosterSearchInput) rosterSearchInput.addEventListener('input', renderRosterListDOM);

  const allTick = document.querySelector('.rosterGradeTick[value="all"]');
  const gradeTicks = Array.from(document.querySelectorAll('.rosterGradeTick')).filter(b => b.value !== 'all');
  if (allTick){
    allTick.addEventListener('change', () => {
      gradeTicks.forEach(b => { b.checked = allTick.checked; });
      renderRosterListDOM();
    });
  }
  gradeTicks.forEach(b => {
    b.addEventListener('change', () => {
      if (allTick) allTick.checked = gradeTicks.every(g => g.checked);
      renderRosterListDOM();
    });
  });
  if (document.getElementById('rosterListItems')) renderRosterListDOM();
}

function upsertStudent(student){
  const idx = state.roster.findIndex(s => normId(s.id) === normId(student.id));
  if (idx >= 0) state.roster[idx] = student;
  else state.roster.push(student);
}

function importRosterText(text){
  let count = 0;
  if(!text) return count;
  const lines = text.split(/\r?\n/);
  lines.forEach(line => {
    const parts = line.split(',');
    if (parts.length >= 3) {
      const id = parts[0].trim();
      const name = parts[1].trim();
      let grade = parts[2].trim();
      if (grade.toLowerCase() !== "faculty & staff") {
         grade = grade.replace(/[^0-9]/g, '').trim();
      }
      const section = parts[3] ? parts[3].trim() : '';
      if (id && name && grade) {
        upsertStudent({ id, name, grade, section });
        count++;
      }
    }
  });
  return count;
}

async function handleVoteSubmit(){
  if (!state.selectedGrade){ state.error = "Roster filter categorization required."; render(); return; }
  if (!state.selectedStudentId){ state.error = "Voter identity authentication required."; render(); return; }

  const rawRoster = await safeGet("election-roster");
  state.roster = rawRoster ? JSON.parse(rawRoster) : state.roster;

  const student = state.roster.find(s => s.id === state.selectedStudentId);
  if (!student){
    state.error = "Identity metrics altered or absent from active memory modules. Please reload select path loops.";
    state.selectedStudentId = "";
    render();
    return;
  }

  const canonicalId = normId(student.id);
  const rawVoters = await safeGet("election-voters");
  
  try {
    const parsedVoters = rawVoters ? JSON.parse(rawVoters) : {};
    if (Array.isArray(parsedVoters)) {
      state.voters = {};
      parsedVoters.forEach(id => { state.voters[id] = 1; });
    } else {
      state.voters = parsedVoters;
    }
  } catch(e) {
    state.voters = {};
  }

  let votesCast = state.voters[canonicalId] || 0;
  let maxAllowed = student.grade === "Faculty & Staff" ? 2 : 1;

  if (votesCast >= maxAllowed){
    state.error = "Vote allotment exceeded. This user has already processed their assigned selections.";
    render();
    return;
  }

  const missing = state.config.positions.filter(p => p.candidates.length > 0 && !state.selections[p.id]);
  if (missing.length > 0){
    state.error = "Unfinished ballots detected. Choices required for: " + missing.map(p => p.title).join(", ");
    render();
    return;
  }

  const rawVotes = await safeGet("election-votes");
  state.votes = rawVotes ? JSON.parse(rawVotes) : state.votes;
  Object.values(state.selections).forEach(candId => { state.votes[candId] = (state.votes[candId] || 0) + 1; });
  
  state.voters[canonicalId] = votesCast + 1;

  await saveVotes();
  await saveVoters();

  state.lastReceipt = { 
    name: student.name, 
    grade: student.grade, 
    time: new Date().toLocaleString(), 
    code: genReceiptCode(),
    votesRemaining: maxAllowed - (votesCast + 1)
  };
  
  state.selections = {};
  state.selectedGrade = "";
  state.selectedStudentId = "";
  state.error = "";
  state.view = "voted";
  render();
}

(async function init(){
  await loadAll();
  render();
})();
</script>
